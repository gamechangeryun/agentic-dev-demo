<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>상품 목록</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:#111827;color:#f9fafb;min-height:100vh}.topbar{background:#1f2937;border-bottom:2px solid #6700e6;padding:16px 28px;display:flex;justify-content:space-between;align-items:center}.topbar h1{font-size:20px;font-weight:700;letter-spacing:-.3px}.btn-primary{background:#6700e6;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s}.btn-primary:hover{background:#5600c0}.main{padding:28px}.card{background:#1f2937;border-radius:12px;overflow:hidden;border:1px solid #374151}table{width:100%;border-collapse:collapse}th{background:#0d1117;padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em}td{padding:14px 18px;border-top:1px solid #374151;font-size:14px;color:#e5e7eb}.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:12px;font-weight:600;gap:5px}.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.8}.badge-active{background:#052e16;color:#4ade80}.badge-archived{background:#1f2937;color:#6b7280;border:1px solid #374151}.empty{padding:56px 24px;text-align:center;color:#6b7280;font-size:15px}</style></head><body><div class="topbar"><h1>상품 목록</h1><button class="btn-primary btn-create">+ 상품 등록</button></div><div class="main"><div class="card"><table><thead><tr><th>상품 ID</th><th>이름</th><th>가격</th><th>재고</th><th>상태</th><th>작업</th></tr></thead><tbody id="rows"><tr><td colspan="6" class="empty">등록된 상품이 없습니다</td></tr></tbody></table></div></div></body></html>
