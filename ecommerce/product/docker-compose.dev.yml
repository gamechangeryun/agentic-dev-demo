services:
  product-api:
    build:
      context: .
      target: dev
    ports:
      - "8002:8000"        # order=8001, product=8002
    environment:
      - ENV=development
      - DEBUG=true
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/products')"]
      interval: 10s
      retries: 3
