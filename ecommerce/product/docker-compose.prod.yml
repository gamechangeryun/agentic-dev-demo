services:
  product-api:
    build:
      context: .
      target: prod
    ports:
      - "8002:8000"
    environment:
      - ENV=production
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/products')"]
      interval: 30s
      retries: 3
