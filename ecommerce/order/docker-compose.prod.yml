services:
  order-api:
    build:
      context: .
      target: prod         # DockerfileмЭШ prod мК§нЕМмЭімІА (Gunicorn)
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/orders')"]
      interval: 30s
      retries: 3
