services:
  order-api:
    build:
      context: .
      target: dev          # Dockerfileмқҳ dev мҠӨн…Ңмқҙм§Җ
    ports:
      - "8001:8000"
    environment:
      - ENV=development
      - DEBUG=true
    volumes:
      - .:/app             # мҶҢмҠӨ bind-mount вҶ’ мҪ”л“ң ліҖкІҪ мҰүмӢң л°ҳмҳҒ
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/orders')"]
      interval: 10s
      retries: 3
