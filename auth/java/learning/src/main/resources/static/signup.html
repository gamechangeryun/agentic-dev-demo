<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>회원가입 · 이메일 OTP 인증</title>
  <style>
    :root { --fg:#1f2933; --muted:#6b7280; --line:#d1d5db; --accent:#2563eb; --ok:#15803d; --err:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
           background:#f3f4f6; color:var(--fg);
           font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
    .signup { width:min(92vw,360px); background:#fff; padding:28px 24px;
              border:1px solid var(--line); border-radius:12px;
              box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .signup + .signup { margin-top:16px; }
    h1 { font-size:20px; margin:0 0 8px; }
    p { margin:0 0 16px; color:var(--muted); font-size:14px; }
    input { width:100%; padding:10px 12px; font-size:16px;
            border:1px solid var(--line); border-radius:8px; }
    input[name=otp] { letter-spacing:.4em; text-align:center; }
    button { width:100%; margin-top:12px; padding:10px 12px; font-size:15px;
             color:#fff; background:var(--accent); border:0; border-radius:8px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .hint { margin-top:10px; font-size:13px; color:var(--muted); min-height:18px; }
    .msg { margin-top:10px; font-size:14px; min-height:18px; }
    .msg.ok { color:var(--ok); }
    .msg.err { color:var(--err); }
    [hidden] { display:none !important; }
  </style>
</head>
<body>
  <!-- 1단계: 이메일 입력 → 인증번호 발급 -->
  <section class="signup" id="step-email">
    <h1>회원가입</h1>
    <p>가입할 이메일을 입력하면 6자리 인증번호를 보내드립니다.</p>
    <input id="email" type="email" name="email" inputmode="email" placeholder="a@x.com" autocomplete="email"/>
    <button id="btn-issue" type="button">인증번호 받기</button>
    <div class="hint" id="issue-hint"></div>
  </section>

  <!-- 2단계: OTP 입력 → 가입. 인증번호 발급 전에는 숨김(부모 컨테이너로 토글).
       내부 <main class="signup"> 는 캐노니컬 스냅샷(signup_otp.html)과 verbatim 일치해야 하므로 태그를 건드리지 않는다. -->
  <div id="step-otp" hidden>
  <main class="signup"><h1>인증번호 입력</h1><p>이메일로 받은 6자리 인증번호를 입력하세요.</p><input name="otp" inputmode="numeric" maxlength="6"/><button type="submit">확인</button></main>
  </div>

  <div class="signup" id="result" hidden>
    <div class="msg" id="result-msg"></div>
  </div>

  <script>
    const REASONS = {
      wrong_code: "인증번호가 올바르지 않습니다.",
      expired: "인증번호가 만료되었습니다. 다시 받아주세요.",
      locked: "5회 초과로 잠겼습니다. 인증번호를 다시 받아주세요.",
      no_otp: "먼저 인증번호를 발급받아 주세요.",
    };

    const emailEl = document.getElementById("email");
    const btnIssue = document.getElementById("btn-issue");
    const issueHint = document.getElementById("issue-hint");
    const stepOtp = document.getElementById("step-otp");
    const otpMain = document.querySelector("main.signup");
    const otpInput = otpMain.querySelector("input[name=otp]");
    const otpBtn = otpMain.querySelector("button[type=submit]");
    const resultBox = document.getElementById("result");
    const resultMsg = document.getElementById("result-msg");

    function showResult(text, ok) {
      resultBox.hidden = false;
      resultMsg.textContent = text;
      resultMsg.className = "msg " + (ok ? "ok" : "err");
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      let data = {};
      try { data = await res.json(); } catch (_) {}
      return { status: res.status, data };
    }

    btnIssue.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      if (!email) { issueHint.textContent = "이메일을 입력하세요."; return; }
      btnIssue.disabled = true;
      issueHint.textContent = "발급 중…";
      try {
        const { status, data } = await postJson("/auth/otp/issue", { email });
        if (status === 200) {
          // 데모 편의: 발급 code를 화면 힌트로 노출(실서비스에서는 메일/SMS 전용).
          issueHint.textContent = "인증번호를 발송했습니다. (데모 코드: " + data.code + ")";
          // 인증번호를 받은 뒤에야 OTP 입력창을 노출한다.
          stepOtp.hidden = false;
          otpInput.value = "";
          resultBox.hidden = true;
          otpInput.focus();
        } else {
          issueHint.textContent = "발급 실패: 이메일 형식을 확인하세요.";
        }
      } catch (_) {
        issueHint.textContent = "네트워크 오류로 발급에 실패했습니다.";
      } finally {
        btnIssue.disabled = false;
      }
    });

    otpBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const code = otpInput.value.trim();
      if (!email) { showResult("먼저 이메일로 인증번호를 받아주세요.", false); return; }
      if (!/^\d{6}$/.test(code)) { showResult("인증번호는 6자리 숫자입니다.", false); return; }
      otpBtn.disabled = true;
      try {
        const { status, data } = await postJson("/auth/signup", { email, code });
        if (status === 201) {
          showResult(data.replay ? "이미 가입된 계정입니다." : "가입이 완료되었습니다.", true);
        } else {
          showResult(REASONS[data.reason] || ("가입 거부: " + (data.reason || "알 수 없음")), false);
        }
      } catch (_) {
        showResult("네트워크 오류로 가입에 실패했습니다.", false);
      } finally {
        otpBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
